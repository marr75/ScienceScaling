[config]
schemaVersion = "0.0.1"

[package]
namespace = "marr75"
name = "ScienceScaling"
versionNumber = "0.0.0"
description = "Labs stop being a flat bonus and become a percentage: each lab adds the same slice of your research rate, however far your program has already scaled."
websiteUrl = "https://github.com/marr75/ScienceScaling"
containsNsfwContent = false

[package.dependencies]
BepInEx-BepInExPack = "5.4.2100" # TODO(verify): confirm exact Thunderstore dependency string + version

[build]
icon = "./icon.png"
readme = "./README.md"
outdir = "./artifacts/thunderstore"

[[build.copy]]
source = "./staging/BepInEx/plugins/ScienceScaling/"
target = "./BepInEx/plugins/ScienceScaling/"

[publish]
repository = "https://thunderstore.io"
communities = ["solar-expanse"] # TODO(pending ecosystem-schema PR): confirm community slug

[publish.categories]
solar-expanse = ["mods"]
